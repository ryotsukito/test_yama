<!doctype html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>お問い合わせ | 株式会社 全林</title><link rel="stylesheet" href="assets/style.css"></head><body><header class="site-header inner"><div class="container nav"><a class="brand" href="index.html">全林<small>ZENRIN SEAFOOD TRADING</small></a><nav class="nav-links"><a href="business.html">事業内容</a><a href="company.html">会社概要</a><a href="recruit.html">採用情報</a><a class="contact-nav current" href="contact.html">お問い合わせ</a></nav></div></header><main><section class="page-head contact"><div class="container"><p class="eyebrow">CONTACT</p><h1>新しい航路を、<br>ここから。</h1></div></section><section class="section"><div class="container"><p class="label">GET IN TOUCH</p><h2 class="title">お問い合わせ</h2><p class="lead">お取引について、採用について。ご用件に合わせたフォームからお気軽にお寄せください。</p><div class="form-shell"><div class="form-tabs"><button class="form-tab active" type="button" data-panel="trade">お取引に関するお問い合わせ</button><button class="form-tab" type="button" data-panel="recruit">採用に関するお問い合わせ</button></div><form class="contact-form form-panel active" id="trade" data-form><div class="field"><label for="trade-company">会社名<span class="required">必須</span></label><input id="trade-company" name="company" required></div><div class="field"><label for="trade-name">お名前<span class="required">必須</span></label><input id="trade-name" name="name" required></div><div class="field"><label for="trade-mail">メールアドレス<span class="required">必須</span></label><input id="trade-mail" type="email" name="email" required></div><div class="field"><label for="trade-tel">電話番号</label><input id="trade-tel" type="tel" name="tel"></div><div class="field"><label for="trade-type">お問い合わせ種別</label><select id="trade-type" name="type"><option>商品の仕入れについて</option><option>お取引について</option><option>その他</option></select></div><div class="field"><label for="trade-message">お問い合わせ内容<span class="required">必須</span></label><textarea id="trade-message" name="message" required></textarea></div><button class="button submit" type="submit">送信内容を確認する</button></form><form class="contact-form form-panel" id="recruit" data-form><div class="field"><label for="recruit-name">お名前<span class="required">必須</span></label><input id="recruit-name" name="name" required></div><div class="field"><label for="recruit-mail">メールアドレス<span class="required">必須</span></label><input id="recruit-mail" type="email" name="email" required></div><div class="field"><label for="recruit-tel">電話番号</label><input id="recruit-tel" type="tel" name="tel"></div><div class="field"><label for="recruit-job">希望職種</label><select id="recruit-job" name="job"><option>営業・仕入れ担当</option><option>物流・品質管理担当</option><option>オープンポジション</option><option>その他</option></select></div><div class="field"><label for="recruit-message">お問い合わせ内容<span class="required">必須</span></label><textarea id="recruit-message" name="message" required></textarea></div><button class="button submit" type="submit">送信内容を確認する</button></form></div><p class="form-message" id="form-message">入力内容を受け付けました。現在は公開前のデモフォームのため、実際には送信されません。</p></div></section></main><footer class="site-footer"><div class="container footer-flex"><a class="brand" href="index.html">全林<small>ZENRIN SEAFOOD TRADING</small></a><p>© 2026 株式会社 全林. All Rights Reserved.</p></div></footer><script>document.querySelectorAll('.form-tab').forEach(button=>button.addEventListener('click',()=>{document.querySelectorAll('.form-tab,.form-panel').forEach(el=>el.classList.remove('active'));button.classList.add('active');document.getElementById(button.dataset.panel).classList.add('active');document.getElementById('form-message').classList.remove('show')}));document.querySelectorAll('[data-form]').forEach(form=>form.addEventListener('submit',event=>{event.preventDefault();if(form.reportValidity())document.getElementById('form-message').classList.add('show')}));</script></body></html>
